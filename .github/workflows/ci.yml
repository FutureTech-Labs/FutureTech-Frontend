name: Frontend CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  # Validates code quality and ensures the application builds successfully
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run type-check

      - name: Build Next.js App
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}

  # Scans repository history for accidentally committed secrets
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          tar -xzf gitleaks_8.30.1_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
      - name: Run Gitleaks
        run: |
          gitleaks detect --source . --verbose

  # Builds, scans, and publishes the Docker image
  docker:
    needs:
      - quality
      - gitleaks

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v7

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Creates a temporary image for vulnerability scanning
      - name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: futuretech-frontend:scan

          cache-from: type=gha
          cache-to: type=gha,mode=max

          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: futuretech-frontend:scan
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: 0

      # Publishes versioned and latest images to Docker Hub
      - name: Build and push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true

          cache-from: type=gha
          cache-to: type=gha,mode=max

          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/futuretech-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/futuretech-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
