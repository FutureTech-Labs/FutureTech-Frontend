name: Frontend CD
on:
    workflow_run:
        workflows:
            - Frontend CI
        types:
            - completed
permissions:
    contents: read
jobs:
    deploy:
        if: >
            github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.head_branch == 'main'

        runs-on: ubuntu-latest

        steps:
            - name: Deploy Frontend to EC2
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}

                  script: |
                      cd ~/apps/futuretech/futuretech-infra

                      docker compose -f compose/docker-compose.yml pull frontend

                      docker compose -f compose/docker-compose.yml up -d --force-recreate frontend

                      docker image prune -f
